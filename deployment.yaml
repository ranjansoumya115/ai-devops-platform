apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops
  template:
    metadata:
      labels:
        app: ai-devops
    spec:
      containers:
      - name: app
        image: devops-ai-app
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
