apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prediction-api-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: prediction-api
  namespaceSelector:
    matchNames:
    - default
  endpoints:
  - port: http
    path: /metrics
    interval: 10s
